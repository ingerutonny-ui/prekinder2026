<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kinder - Ejercicios Interactivos</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background-color: #fffde7; height: 100vh; overflow: hidden; font-family: sans-serif; }
        
        .header-nav { width: 100%; height: 10vh; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; }
        
        #canvas-container { 
            flex-grow: 1; width: 85vw; height: 75vh; margin: 10px; 
            border: 10px solid #fff; border-radius: 30px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            background: white; position: relative;
        }
        
        #lienzo { width: 100%; height: 100%; touch-action: none; cursor: crosshair; }
        
        .paleta-container { height: 15vh; display: flex; gap: 20px; align-items: center; justify-content: center; }
        .color-btn { width: 70px; height: 70px; border-radius: 50%; border: 5px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; }
    </style>
</head>
<body>

<div class="header-nav">
    <button onclick="cambiarEjercicio(-1)">ANTERIOR</button>
    <h3>Ejercicio <span id="numEj">1</span> de 5</h3>
    <button onclick="cambiarEjercicio(1)">SIGUIENTE</button>
</div>

<div id="canvas-container" style="background-image: url('fondo_trazos.jpg'); background-size: cover;">
    <canvas id="lienzo"></canvas>
</div>

<div class="paleta-container">
    <div class="color-btn" style="background: red;" onclick="colorActual='red'"></div>
    <div class="color-btn" style="background: purple;" onclick="colorActual='purple'"></div>
    <div class="color-btn" style="background: blue;" onclick="colorActual='blue'"></div>
    <div class="color-btn" style="background: #8B4513;" onclick="colorActual='#8B4513'"></div>
    <div class="color-btn" style="background: green;" onclick="colorActual='green'"></div>
    <button onclick="limpiarCanvas()" style="padding: 15px;">LIMPIAR</button>
</div>

<script>
    const canvas = document.getElementById('lienzo');
    const ctx = canvas.getContext('2d');
    const ejercicios = ['p_auto.png', 'p_caracol.png', 'p_casa.png', 'p_perro.png', 'p_pez.png'];
    let indiceActual = 0;
    let colorActual = 'red';
    
    // COMENTARIO: Cambia el valor de 'lineWidth' para ajustar el grosor del pincel
    const GROSOR_PINCEL = 10; 

    function cargarEjercicio() {
        const img = new Image();
        img.onload = () => {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            document.getElementById('numEj').innerText = indiceActual + 1;
        };
        img.src = ejercicios[indiceActual];
    }

    function cambiarEjercicio(dir) {
        indiceActual = (indiceActual + dir + ejercicios.length) % ejercicios.length;
        cargarEjercicio();
    }

    function limpiarCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        cargarEjercicio();
    }

    function dibujar(e) {
        if (e.buttons !== 1 && e.type !== 'touchmove') return;
        ctx.lineWidth = GROSOR_PINCEL;
        ctx.lineCap = 'round';
        ctx.strokeStyle = colorActual;
        ctx.globalAlpha = 0.7;

        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.touches[0].clientX) - rect.left;
        const y = (e.clientY || e.touches[0].clientY) - rect.top;

        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    canvas.addEventListener('mousedown', (e) => { ctx.beginPath(); dibujar(e); });
    canvas.addEventListener('mousemove', dibujar);
    canvas.addEventListener('touchstart', (e) => { ctx.beginPath(); dibujar(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); dibujar(e); });
    
    window.onload = cargarEjercicio;
</script>
</body>
</html>
