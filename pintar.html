<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kinder - Ejercicios</title>
    <style>
        /* Fondo original */
        body { 
            margin: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            background-image: url('fondo_trazos.jpg'); 
            background-size: cover; background-position: center;
            font-family: sans-serif;
        }
        
        .header-nav { 
            width: 100%; height: 12vh; display: flex; justify-content: space-between; 
            align-items: center; padding: 0 20px; box-sizing: border-box;
        }

        /* Estilo del letrero según tu captura */
        #letrero-titulo {
            background: white; 
            padding: 15px 40px; 
            border-radius: 50px;
            border: 4px solid #FF4500; 
            color: #FF4500; 
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
        }

        #canvas-container { 
            flex-grow: 1; width: 85vw; height: 65vh;
            background: white; border-radius: 40px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }
        
        #lienzo { width: 100%; height: 100%; object-fit: contain; touch-action: none; cursor: crosshair; }
        
        .paleta-container { height: 15vh; display: flex; gap: 20px; align-items: center; justify-content: center; }
        .color-btn { width: 70px; height: 70px; border-radius: 50%; border: 5px solid white; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        .btn-limpiar { background: #ff5252; color: white; border: none; padding: 20px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header-nav">
    <button onclick="cambiarEjercicio(-1)" style="padding: 15px 30px; border-radius: 50px; cursor: pointer;">← Volver</button>
    
    <div id="letrero-titulo">✨ PINTA CON TU DEDITO LA IMAGEN ✨</div>
    
    <button onclick="cambiarEjercicio(1)" style="padding: 15px 30px; border-radius: 50px; cursor: pointer;">Siguiente →</button>
</div>

<div id="canvas-container">
    <canvas id="lienzo"></canvas>
</div>

<div class="paleta-container">
    <div class="color-btn" style="background: red;" onclick="colorActual='red'"></div>
    <div class="color-btn" style="background: purple;" onclick="colorActual='yellow'"></div>
    <div class="color-btn" style="background: blue;" onclick="colorActual='blue'"></div>
    <div class="color-btn" style="background: #8B4513;" onclick="colorActual='#8B4513'"></div>
    <div class="color-btn" style="background: green;" onclick="colorActual='green'"></div>
    <button class="btn-limpiar" onclick="limpiarCanvas()">Limpiar</button>
</div>

<script>
    const canvas = document.getElementById('lienzo');
    const ctx = canvas.getContext('2d');
    const ejercicios = ['p_auto.png', 'p_caracol.png', 'p_casa.png', 'p_perro.png', 'p_pez.png'];
    let indiceActual = 0;
    let colorActual = 'red';
    let isDrawing = false;
    
    const GROSOR_PINCEL = 20; 

    function cargarEjercicio() {
        const img = new Image();
        img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);
        };
        img.src = ejercicios[indiceActual];
    }

    function cambiarEjercicio(dir) {
        indiceActual = (indiceActual + dir + ejercicios.length) % ejercicios.length;
        cargarEjercicio();
    }

    function limpiarCanvas() { cargarEjercicio(); }

    function startDraw(e) { isDrawing = true; ctx.beginPath(); draw(e); }
    function draw(e) {
        if (!isDrawing) return;
        ctx.lineWidth = GROSOR_PINCEL;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.strokeStyle = colorActual;
        ctx.globalAlpha = 0.8;
        const rect = canvas.getBoundingClientRect();
        const x = ((e.clientX || e.touches[0].clientX) - rect.left) * (canvas.width / rect.width);
        const y = ((e.clientY || e.touches[0].clientY) - rect.top) * (canvas.height / rect.height);
        ctx.lineTo(x, y);
        ctx.stroke();
    }
    function stopDraw() { isDrawing = false; }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
    canvas.addEventListener('touchend', stopDraw);
    
    window.onload = cargarEjercicio;
</script>
</body>
</html>
