<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinder - Ejercicio</title>
    <style>
        body { 
            margin: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            background-image: url('fondo_trazos.jpg'); 
            background-size: cover; background-position: center;
            font-family: sans-serif;
        }

        .header-nav { 
            width: 100%; height: 15vh; display: flex; justify-content: space-between; 
            align-items: center; padding: 0 40px; box-sizing: border-box;
        }

        /* Botones estilo exacto: Circulares, sombra marcada, borde blanco */
        .btn-nav { 
            width: 130px; height: 130px; border-radius: 50%;
            background: #fff; border: 8px solid #fff;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            font-weight: bold; cursor: pointer; font-size: 1.2rem;
        }

        #letrero-titulo {
            background: white; padding: 20px 60px; border-radius: 50px;
            border: 5px solid #FF4500; color: #FF4500; font-weight: bold;
            font-size: 2rem; text-align: center;
        }

        #canvas-container { 
            flex-grow: 1; width: 80vw; height: 60vh;
            background: white; border-radius: 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden; margin-bottom: 20px;
        }
        
        #lienzo { width: 100%; height: 100%; object-fit: contain; cursor: crosshair; }
        
        .paleta-container { height: 18vh; display: flex; gap: 20px; align-items: center; justify-content: center; padding-bottom: 20px; }
        .color-btn { 
            width: 90px; height: 90px; border-radius: 50%; 
            border: 8px solid #fff; cursor: pointer; 
            box-shadow: 0 6px 10px rgba(0,0,0,0.4); 
        }
    </style>
</head>
<body>

<div class="header-nav">
    <button class="btn-nav" onclick="cambiarEjercicio(-1)">⬅</button>
    <div id="letrero-titulo">PINTA CON TU DEDITO LA IMAGEN</div>
    <button class="btn-nav" onclick="cambiarEjercicio(1)">➡</button>
</div>

<div id="canvas-container">
    <canvas id="lienzo"></canvas>
</div>

<div class="paleta-container">
    <div class="color-btn" style="background: red;" onclick="colorActual='red'"></div>
    <div class="color-btn" style="background: purple;" onclick="colorActual='purple'"></div>
    <div class="color-btn" style="background: blue;" onclick="colorActual='blue'"></div>
    <div class="color-btn" style="background: #8B4513;" onclick="colorActual='#8B4513'"></div>
    <div class="color-btn" style="background: green;" onclick="colorActual='green'"></div>
</div>

<script>
    const canvas = document.getElementById('lienzo');
    const ctx = canvas.getContext('2d');
    const ejercicios = ['p_auto.png', 'p_caracol.png', 'p_casa.png', 'p_perro.png', 'p_pez.png'];
    let indiceActual = 0;
    let colorActual = 'red';
    let isDrawing = false;
    
    // Configuración de trazo para línea pura
    const GROSOR_PINCEL = 10; 

    function cargarEjercicio() {
        const img = new Image();
        img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);
        };
        img.src = ejercicios[indiceActual];
    }

    function cambiarEjercicio(dir) {
        indiceActual = (indiceActual + dir + ejercicios.length) % ejercicios.length;
        cargarEjercicio();
    }

    function startDraw(e) { isDrawing = true; ctx.beginPath(); draw(e); }
    function draw(e) {
        if (!isDrawing) return;
        ctx.lineWidth = GROSOR_PINCEL;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.strokeStyle = colorActual;
        ctx.globalAlpha = 0.85;
        
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        const x = (clientX - rect.left) * (canvas.width / rect.width);
        const y = (clientY - rect.top) * (canvas.height / rect.height);
        ctx.lineTo(x, y);
        ctx.stroke();
    }
    function stopDraw() { isDrawing = false; }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
    canvas.addEventListener('touchend', stopDraw);
    
    window.onload = cargarEjercicio;
</script>
</body>
</html>
