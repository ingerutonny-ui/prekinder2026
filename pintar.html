<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kinder - Pintar</title>
    <style>
        body { 
            margin: 0; height: 100dvh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            background-image: url('fondo_trazos.jpg'); 
            background-size: cover; background-position: center;
            font-family: Arial, sans-serif;
        }

        .header-nav { 
            height: 10vh; 
            flex-shrink: 0; 
            display: flex; 
            align-items: center; 
            padding: 0 10px; 
            /*background: rgba(255, 255, 255, 0.8);*/
            justify-content: space-between; /* Mantiene los botones en los extremos */
        }

        .btn-nav, .btn-siguiente { 
            background: #2196F3; color: white; border: none; padding: 8px 15px; 
            border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1rem;
            box-shadow: 0 3px 0 #1565C0;
        }
        .btn-siguiente { background: #FF9800; box-shadow: 0 3px 0 #F57C00; }
        .btn-capture { 
            background-color: #9C27B0; 
            color: white; 
            border: none; 
            padding: 8px 12px; 
            border-radius: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            text-align: center; 
            font-size: 0.7rem;
        }
        
        #letrero-titulo {
            background: white; padding: 5px 15px; border-radius: 50px;
            border: 4px solid #FF4500; color: #FF4500; font-weight: bold;
            font-size: 1rem; text-align: center;
        }

        /* CORRECCIÓN: Lienzo a pantalla completa */
        #canvas-container { 
                flex-grow: 1; 
                width: 100vw;
                display: flex; 
                justify-content: center; 
                align-items: center;
                overflow: hidden;
                background: white; /* Tu lienzo blanco */
         }
        
        /* HACEMOS QUE EL LIENZO LLENE EL CONTENEDOR SIN DEFORMARSE */
            #lienzo { 
                width: 100%; 
                height: 100%; 
                object-fit: contain; /* Mantiene proporción, pero al ser 100% llenará el espacio */
                cursor: crosshair; 
                touch-action: none;
            }
        
        .paleta-container { 
                height: 15vh; flex-shrink: 0; width: 100%; display: flex; gap: 10px; 
                align-items: center; justify-content: center; 
                background-color: white; padding: 10px 0; z-index: 10;
        }
        .color-btn { width: 45px; height: 45px; border-radius: 50%; border: 4px solid #fff; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        
        .btn-limpiar { 
            background: black; color: white; border: none; padding: 8px 12px; 
            border-radius: 15px; font-weight: bold; cursor: pointer; text-align: center; font-size: 0.7rem;
        }

        @media (max-width: 600px) {
            .header-nav { height: 8vh; }
            #letrero-titulo { font-size: 0.7rem; padding: 3px 8px; }
            .btn-nav, .btn-siguiente { padding: 6px 12px; font-size: 0.7rem; }
            .color-btn { width: 30px; height: 30px; border: 2px solid #fff; }
            .paleta-container { gap: 3px; height: 12vh; }
            .btn-limpiar { padding: 4px 8px; font-size: 0.6rem; }
        }
    </style>
</head>
<body>

<div class="header-nav">
    <button class="btn-nav" onclick="cambiarEjercicio(-1)">← Volver</button>
    <div id="letrero-titulo">✨ PINTA CON TU DEDITO ✨</div>
    <button class="btn-siguiente" onclick="cambiarEjercicio(1)">Siguiente →</button>
</div>

<div id="canvas-container">
    <canvas id="lienzo"></canvas>
</div>

<div class="paleta-container">
    <div class="color-btn" style="background: red;" onclick="colorActual='red'"></div>
    <div class="color-btn" style="background: yellow;" onclick="colorActual='yellow'"></div>
    <div class="color-btn" style="background: blue;" onclick="colorActual='blue'"></div>
    <div class="color-btn" style="background: orange;" onclick="colorActual='orange'"></div>
    <div class="color-btn" style="background: green;" onclick="colorActual='green'"></div>
    <button class="btn-limpiar" onclick="limpiarCanvas()">🗑<br>LIMPIAR</button>
    <button class="btn btn-capture" onclick="capturarPantalla()">📸 CAPTURAR</button>
</div>

<script>
    const canvas = document.getElementById('lienzo');
    const ctx = canvas.getContext('2d');
    const ejercicios = ['p_auto.png', 'p_caracol.png', 'p_casa.png', 'p_perro.png', 'p_pez.png'];
    let indiceActual = 0;
    let colorActual = 'red';
    let isDrawing = false;
    const GROSOR_PINCEL = 30;

    function cargarEjercicio() {
        const img = new Image();
        img.onload = () => {
            // Ajustamos el canvas al tamaño real del contenedor tras el cambio CSS
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        };
        img.src = ejercicios[indiceActual];
    }

    function cambiarEjercicio(dir) {
        indiceActual = (indiceActual + dir + ejercicios.length) % ejercicios.length;
        cargarEjercicio();
    }

    function limpiarCanvas() { cargarEjercicio(); }

    function capturarPantalla() {
        const link = document.createElement('a');
        // Usamos el nombre del archivo actual para guardar
        const nombreArchivo = ejercicios[indiceActual].split('.')[0]; 
        link.download = `pinta_${nombreArchivo}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    }


    function startDraw(e) { isDrawing = true; ctx.beginPath(); draw(e); }
    function draw(e) {
        if (!isDrawing) return;
        ctx.lineWidth = GROSOR_PINCEL;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.strokeStyle = colorActual;
        ctx.globalAlpha = 0.85;
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        const x = (clientX - rect.left);
        const y = (clientY - rect.top);
        ctx.lineTo(x, y);
        ctx.stroke();
    }
    function stopDraw() { isDrawing = false; }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
    canvas.addEventListener('touchend', stopDraw);
    
    window.onload = cargarEjercicio;
</script>
</body>
</html>
