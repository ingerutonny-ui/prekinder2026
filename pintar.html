<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kinder - Ejercicios Interactivos</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background-color: #fffde7; height: 100vh; overflow: hidden; font-family: sans-serif; }
        
        .nav-controls { width: 100%; height: 8vh; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; }
        
        #canvas-container { 
            flex-grow: 1; width: 95vw; margin: 5px; border: 8px solid #ffd700; 
            border-radius: 20px; background: white; display: flex; 
            justify-content: center; align-items: center; position: relative;
            touch-action: none;
        }
        
        /* Forzamos al canvas a llenar el espacio disponible manteniendo proporciones */
        #lienzo { width: 100%; height: 100%; object-fit: contain; cursor: crosshair; }
        
        .controles { height: 15vh; display: flex; gap: 15px; align-items: center; justify-content: center; width: 100%; }
        .color-btn { width: 60px; height: 60px; border-radius: 50%; border: 4px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.2); cursor: pointer; }
    </style>
</head>
<body>

<div class="nav-controls">
    <button onclick="cambiarEjercicio(-1)" style="padding: 10px 20px;">ANTERIOR</button>
    <h3 id="tituloEjercicio">Cargando...</h3>
    <button onclick="cambiarEjercicio(1)" style="padding: 10px 20px;">SIGUIENTE</button>
</div>

<div id="canvas-container">
    <canvas id="lienzo"></canvas>
</div>

<div class="controles">
    <div class="color-btn" style="background: red;" onclick="colorActual='red'"></div>
    <div class="color-btn" style="background: purple;" onclick="colorActual='purple'"></div>
    <div class="color-btn" style="background: blue;" onclick="colorActual='blue'"></div>
    <div class="color-btn" style="background: #8B4513;" onclick="colorActual='#8B4513'"></div>
    <div class="color-btn" style="background: green;" onclick="colorActual='green'"></div>
    <button onclick="limpiarCanvas()" style="padding: 15px; font-weight: bold;">LIMPIAR</button>
</div>

<script>
    const canvas = document.getElementById('lienzo');
    const ctx = canvas.getContext('2d');
    // Imágenes de prueba de internet
    const ejercicios = [
        'https://img.freepik.com/vector-premium/letra-vocal-con-caracol-dibujos-animados_8595-1033.jpg',
        'https://img.freepik.com/vector-premium/letra-e-elefante-estilo-dibujos-animados_8595-1034.jpg',
        'https://img.freepik.com/vector-premium/letra-i-iguana-estilo-dibujos-animados_8595-1035.jpg',
        'https://img.freepik.com/vector-premium/letra-o-oso-estilo-dibujos-animados_8595-1036.jpg',
        'https://img.freepik.com/vector-premium/letra-u-unicornio-estilo-dibujos-animados_8595-1037.jpg'
    ];
    let indiceActual = 0;
    let colorActual = 'red';
    let baseImage = new Image();

    function cargarEjercicio() {
        baseImage.onload = () => {
            canvas.width = baseImage.width;
            canvas.height = baseImage.height;
            ctx.drawImage(baseImage, 0, 0);
            document.getElementById('tituloEjercicio').innerText = `Ejercicio ${indiceActual + 1} de 5`;
        };
        baseImage.src = ejercicios[indiceActual];
    }

    function cambiarEjercicio(dir) {
        indiceActual = (indiceActual + dir + ejercicios.length) % ejercicios.length;
        cargarEjercicio();
    }

    function limpiarCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(baseImage, 0, 0);
    }

    function dibujar(e) {
        if (e.buttons !== 1 && e.type !== 'touchmove') return;
        ctx.lineWidth = 25; ctx.lineCap = 'round'; ctx.strokeStyle = colorActual; ctx.globalAlpha = 0.6;
        const rect = canvas.getBoundingClientRect();
        // Ajuste de escala para que el dibujo coincida con el dedo/cursor
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clientX = e.clientX || e.touches[0].clientX;
        const clientY = e.clientY || e.touches[0].clientY;
        const x = (clientX - rect.left) * scaleX;
        const y = (clientY - rect.top) * scaleY;
        ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
    }

    canvas.addEventListener('mousedown', (e) => { ctx.beginPath(); dibujar(e); });
    canvas.addEventListener('mousemove', dibujar);
    canvas.addEventListener('touchstart', (e) => { ctx.beginPath(); dibujar(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); dibujar(e); });
    
    cargarEjercicio();
</script>
</body>
</html>
