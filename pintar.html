<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kinder - Pintar</title>
    <style>
        body { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            background-color: #fffa66; /* Fondo base para asegurar visibilidad */
            font-family: sans-serif; touch-action: none;
        }

        /* Barra superior responsiva */
        .header-nav { 
            width: 100%; height: 15vh; display: flex; justify-content: space-around; 
            align-items: center; padding: 10px; box-sizing: border-box;
        }

        .btn-nav { 
            padding: 15px 30px; border-radius: 50px; border: 2px solid #333;
            background: #e0e0e0; font-weight: bold; cursor: pointer; font-size: 1rem;
        }

        #letrero-titulo {
            background: white; padding: 10px 25px; border-radius: 50px;
            border: 4px solid #ff4500; color: #ff4500; font-weight: bold;
            font-size: 1.2rem; text-align: center; max-width: 40%;
        }

        /* Contenedor principal que se ajusta */
        #canvas-container { 
            flex-grow: 1; width: 90vw; max-width: 800px; height: 60vh;
            background: white; border-radius: 40px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden; margin-bottom: 10px;
        }
        
        #lienzo { width: 100%; height: 100%; object-fit: contain; cursor: crosshair; }
        
        .paleta-container { height: 15vh; display: flex; gap: 15px; align-items: center; justify-content: center; padding-bottom: 20px; }
        .color-btn { width: 60px; height: 60px; border-radius: 50%; border: 4px solid white; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn-limpiar { padding: 15px 25px; border-radius: 10px; border: 1px solid #333; cursor: pointer; }
    </style>
</head>
<body>

<div class="header-nav">
    <button class="btn-nav" onclick="cambiarEjercicio(-1)">← Volver</button>
    <div id="letrero-titulo">✨ PINTA CON TU DEDITO LA IMAGEN ✨</div>
    <button class="btn-nav" onclick="cambiarEjercicio(1)">Siguiente →</button>
</div>

<div id="canvas-container">
    <canvas id="lienzo"></canvas>
</div>

<div class="paleta-container">
    <div class="color-btn" style="background: red;" onclick="colorActual='red'"></div>
    <div class="color-btn" style="background: purple;" onclick="colorActual='purple'"></div>
    <div class="color-btn" style="background: blue;" onclick="colorActual='blue'"></div>
    <div class="color-btn" style="background: #8B4513;" onclick="colorActual='#8B4513'"></div>
    <div class="color-btn" style="background: green;" onclick="colorActual='green'"></div>
    <button class="btn-limpiar" onclick="limpiarCanvas()">Limpiar</button>
</div>

<script>
    const canvas = document.getElementById('lienzo');
    const ctx = canvas.getContext('2d');
    const ejercicios = ['p_auto.png', 'p_caracol.png', 'p_casa.png', 'p_perro.png', 'p_pez.png'];
    let indiceActual = 0;
    let colorActual = 'red';
    let isDrawing = false;
    
    function cargarEjercicio() {
        const img = new Image();
        img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);
        };
        img.src = ejercicios[indiceActual];
    }

    function cambiarEjercicio(dir) {
        indiceActual = (indiceActual + dir + ejercicios.length) % ejercicios.length;
        cargarEjercicio();
    }

    function limpiarCanvas() { cargarEjercicio(); }

    function startDraw(e) { isDrawing = true; ctx.beginPath(); draw(e); }
    function draw(e) {
        if (!isDrawing) return;
        ctx.lineWidth = 20;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.strokeStyle = colorActual;
        ctx.globalAlpha = 0.7;
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        const x = (clientX - rect.left) * (canvas.width / rect.width);
        const y = (clientY - rect.top) * (canvas.height / rect.height);
        ctx.lineTo(x, y);
        ctx.stroke();
    }
    function stopDraw() { isDrawing = false; }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
    canvas.addEventListener('touchend', stopDraw);
    
    window.onload = cargarEjercicio;
</script>
</body>
</html>
