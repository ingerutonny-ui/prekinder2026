<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kinder - Ejercicio</title>
    <style>
        /* Fondo estático y original */
        body { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            background-image: url('fondo_trazos.jpg'); 
            background-size: cover; background-position: center; background-repeat: no-repeat;
            font-family: 'Arial', sans-serif;
        }

        .header-nav { 
            width: 100%; height: 15vh; display: flex; justify-content: space-between; 
            align-items: center; padding: 0 50px; box-sizing: border-box;
        }

        /* Botones estilo original */
        .btn-nav { 
            width: 120px; height: 60px; border-radius: 30px; border: 2px solid #333;
            background: #fff; font-weight: bold; cursor: pointer; font-size: 1.1rem;
        }

        #letrero-titulo {
            background: white; padding: 15px 40px; border-radius: 50px;
            border: 4px solid #FF4500; color: #FF4500; font-weight: bold;
            font-size: 1.5rem; text-align: center;
        }

        #canvas-container { 
            flex-grow: 1; width: 80vw; height: 60vh;
            background: white; border-radius: 40px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden; margin-bottom: 20px;
        }
        
        #lienzo { width: 100%; height: 100%; object-fit: contain; cursor: crosshair; touch-action: none; }
        
        .paleta-container { height: 15vh; display: flex; gap: 30px; align-items: center; justify-content: center; padding-bottom: 20px; }
        .color-btn { width: 80px; height: 80px; border-radius: 50%; border: 6px solid #fff; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn-limpiar { padding: 20px 40px; border-radius: 30px; border: 2px solid #333; font-weight: bold; cursor: pointer; background: #fff; }
    </style>
</head>
<body>

<div class="header-nav">
    <button class="btn-nav" onclick="cambiarEjercicio(-1)">Volver</button>
    <div id="letrero-titulo">✨PINTA CON TU DEDITO LA IMAGEN✨</div>
    <button class="btn-nav" onclick="cambiarEjercicio(1)">Siguiente</button>
</div>

<div id="canvas-container">
    <canvas id="lienzo"></canvas>
</div>

<div class="paleta-container">
    <div class="color-btn" style="background: red;" onclick="colorActual='red'"></div>
    <div class="color-btn" style="background: purple;" onclick="colorActual='purple'"></div>
    <div class="color-btn" style="background: blue;" onclick="colorActual='blue'"></div>
    <div class="color-btn" style="background: #8B4513;" onclick="colorActual='#8B4513'"></div>
    <div class="color-btn" style="background: green;" onclick="colorActual='green'"></div>
    <button class="btn-limpiar" onclick="limpiarCanvas()">Limpiar</button>
</div>

<script>
    const canvas = document.getElementById('lienzo');
    const ctx = canvas.getContext('2d');
    const ejercicios = ['p_auto.png', 'p_caracol.png', 'p_casa.png', 'p_perro.png', 'p_pez.png'];
    let indiceActual = 0;
    let colorActual = 'red';
    let isDrawing = false;
    
    // COMENTARIO: Ajusta el valor de GROSOR_PINCEL para cambiar el tamaño de la línea
    const GROSOR_PINCEL = 10;

    function cargarEjercicio() {
        const img = new Image();
        img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);
        };
        img.src = ejercicios[indiceActual];
    }

    function cambiarEjercicio(dir) {
        indiceActual = (indiceActual + dir + ejercicios.length) % ejercicios.length;
        cargarEjercicio();
    }

    function limpiarCanvas() { cargarEjercicio(); }

    function startDraw(e) { isDrawing = true; ctx.beginPath(); draw(e); }
    function draw(e) {
        if (!isDrawing) return;
        ctx.lineWidth = GROSOR_PINCEL;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.strokeStyle = colorActual;
        ctx.globalAlpha = 0.8;
        
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        const x = (clientX - rect.left) * (canvas.width / rect.width);
        const y = (clientY - rect.top) * (canvas.height / rect.height);
        ctx.lineTo(x, y);
        ctx.stroke();
    }
    function stopDraw() { isDrawing = false; }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
    canvas.addEventListener('touchend', stopDraw);
    
    window.onload = cargarEjercicio;
</script>
</body>
</html>
