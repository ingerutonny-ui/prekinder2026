<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clase 5: Afinación y Validación Continua</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100vw; height: 100vh; overflow: hidden; 
            touch-action: none; background-color: #f8f9fa; 
            font-family: 'Segoe UI', sans-serif;
        }
        canvas { display: block; cursor: crosshair; }
        #mensaje {
            position: absolute; top: 30px; width: 100%;
            text-align: center; font-size: 2rem; font-weight: 900;
            pointer-events: none; transition: all 0.2s;
        }
    </style>
</head>
<body>

    <div id="mensaje">SIGUE EL CAMINO</div>
    <canvas id="lienzo"></canvas>

    <script>
        const canvas = document.getElementById('lienzo');
        const ctx = canvas.getContext('2d');
        const msg = document.getElementById('mensaje');
        
        let dibujando = false;
        const figura = { x: 0, y: 0, radio: 120 };

        function ajustar() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            figura.x = canvas.width / 2;
            figura.y = canvas.height / 2;
            dibujarGuia();
        }

        function dibujarGuia() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Sombra del objetivo
            ctx.beginPath();
            ctx.arc(figura.x, figura.y, figura.radio, 0, Math.PI * 2);
            ctx.strokeStyle = "#dfe6e9";
            ctx.lineWidth = 5;
            ctx.setLineDash([15, 15]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function estaDentro(x, y) {
            const dx = x - figura.x;
            const dy = y - figura.y;
            return Math.sqrt(dx*dx + dy*dy) <= figura.radio;
        }

        function manejarMovimiento(e) {
            if (!dibujando) return;
            e.preventDefault();
            const t = e.touches ? e.touches[0] : e;
            const x = t.clientX;
            const y = t.clientY;

            // AFINACIÓN: Validamos en cada movimiento
            const correcto = estaDentro(x, y);
            
            // Cambiamos el estilo de línea al vuelo
            ctx.lineTo(x, y);
            ctx.strokeStyle = correcto ? "#2ecc71" : "#e74c3c";
            ctx.lineWidth = correcto ? 20 : 10; // Más grueso si es correcto
            ctx.stroke();

            // Creamos un nuevo camino para que el siguiente segmento pueda tener otro color
            ctx.beginPath();
            ctx.moveTo(x, y);

            // Feedback de texto
            msg.innerText = correcto ? "¡EXCELENTE!" : "¡TE SALISTE!";
            msg.style.color = correcto ? "#2ecc71" : "#e74c3c";
        }

        function iniciar(e) {
            e.preventDefault();
            const t = e.touches ? e.touches[0] : e;
            dibujando = true;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.beginPath();
            ctx.moveTo(t.clientX, t.clientY);
        }

        window.onresize = ajustar;
        ajustar();

        // Listeners afinados
        canvas.addEventListener('touchstart', iniciar, {passive: false});
        canvas.addEventListener('touchmove', manejarMovimiento, {passive: false});
        canvas.addEventListener('touchend', () => { dibujando = false; });

        // Soporte PC
        canvas.addEventListener('mousedown', iniciar);
        canvas.addEventListener('mousemove', manejarMovimiento);
        window.addEventListener('mouseup', () => { dibujando = false; });
    </script>
</body>
</html>
