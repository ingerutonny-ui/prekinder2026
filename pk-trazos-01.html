<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clase 1: Bloqueo de Pantalla</title>
    <style>
        /* ESTILO NANCY ELEGANTE: 130% Zoom y Bloqueo Total */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: #2c3e50;
            overflow: hidden; /* BLOQUEO DE SCROLL */
            touch-action: none; /* BLOQUEO DE GESTOS NATIVOS */
            font-family: Arial, sans-serif;
        }

        #area-maestra {
            width: 300px; height: 300px;
            background-color: white;
            border-radius: 20px;
            display: flex; justify-content: center; align-items: center;
            text-align: center;
            zoom: 130%; /* Escalado solicitado */
            position: relative;
        }

        #info { font-weight: bold; color: #34495e; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="area-maestra">
        <div id="info">TOCA UNA ESQUINA</div>
    </div>

    <script>
        const area = document.getElementById('area-maestra');
        const info = document.getElementById('info');

        function detectarEsquina(e) {
            e.preventDefault(); // PUNTO CLAVE: Bloquea cualquier reacción del navegador
            
            const rect = area.getBoundingClientRect();
            const toque = e.touches ? e.touches[0] : e;
            
            // Calculamos posición relativa al cuadro (ajustando el zoom 1.3)
            const x = (toque.clientX - rect.left) / 1.3;
            const y = (toque.clientY - rect.top) / 1.3;

            // Lógica de Seccionamiento (Clase 1 - Nivel Inicial)
            let mensaje = "";
            if (x < 150 && y < 150) mensaje = "ESQUINA SUPERIOR IZQ.";
            else if (x >= 150 && y < 150) mensaje = "ESQUINA SUPERIOR DER.";
            else if (x < 150 && y >= 150) mensaje = "ESQUINA INFERIOR IZQ.";
            else mensaje = "ESQUINA INFERIOR DER.";

            info.innerText = mensaje;
            area.style.backgroundColor = "#ecf0f1";
        }

        // Eventos de inicio de toque
        area.addEventListener('touchstart', detectarEsquina);
        area.addEventListener('mousedown', detectarEsquina);
        
        // Al soltar volvemos al estado inicial
        area.addEventListener('touchend', () => { area.style.backgroundColor = "white"; });
    </script>
</body>
</html>
