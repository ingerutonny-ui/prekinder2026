<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clase 1: Bloqueo y Seccionamiento Total</title>
    <style>
        /* CONFIGURACIÓN DE PANTALLA COMPLETA */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;    /* Bloqueo de scroll */
            touch-action: none;  /* Bloqueo de gestos del navegador */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #indicador {
            color: white;
            font-size: 3rem;
            font-weight: 900;
            text-align: center;
            pointer-events: none; /* No interfiere con el toque */
            text-transform: uppercase;
        }

        /* Guías visuales opcionales para que veas la división en el manual */
        .guia-h { position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(255,255,255,0.1); }
        .guia-v { position: absolute; left: 50%; top: 0; width: 1px; height: 100%; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="guia-h"></div>
    <div class="guia-v"></div>
    <div id="indicador">Toca la pantalla</div>

    <script>
        const indicador = document.getElementById('indicador');

        function procesarToque(e) {
            e.preventDefault(); // BLOQUEO TOTAL DE PANTALLA
            
            const toque = e.touches ? e.touches[0] : e;
            
            // OBTENEMOS EL TAMAÑO TOTAL DE LA VENTANA (PC o Celular)
            const anchoTotal = window.innerWidth;
            const altoTotal = window.innerHeight;

            // COORDENADAS DEL DEDO
            const x = toque.clientX;
            const y = toque.clientY;

            // LÓGICA DE SECCIONAMIENTO POR ESQUINAS
            let seccion = "";
            let color = "";

            if (x < anchoTotal / 2 && y < altoTotal / 2) {
                seccion = "Esquina Superior Izquierda";
                color = "#e74c3c"; // Rojo
            } else if (x >= anchoTotal / 2 && y < altoTotal / 2) {
                seccion = "Esquina Superior Derecha";
                color = "#3498db"; // Azul
            } else if (x < anchoTotal / 2 && y >= altoTotal / 2) {
                seccion = "Esquina Inferior Izquierda";
                color = "#f1c40f"; // Amarillo
            } else {
                seccion = "Esquina Inferior Derecha";
                color = "#2ecc71"; // Verde
            }

            document.body.style.backgroundColor = color;
            indicador.innerText = seccion;
        }

        // ESCUCHAMOS EN TODA LA VENTANA (WINDOW)
        window.addEventListener('touchstart', procesarToque, { passive: false });
        window.addEventListener('mousedown', procesarToque);

        // Reset al soltar
        const reset = () => {
            document.body.style.backgroundColor = "#2c3e50";
            indicador.innerText = "Toca la pantalla";
        };
        window.addEventListener('touchend', reset);
        window.addEventListener('mouseup', reset);
    </script>
</body>
</html>
