<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clase 6: Gestión de Estados Táctiles</title>
    <style>
        /* ESTILO NANCY ELEGANTE 130% */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; height: 100%; 
            overflow: hidden; touch-action: none;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background-color: #f4f7f6;
            font-family: 'Segoe UI', sans-serif;
        }

        #contenedor-principal {
            zoom: 130%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 { margin-bottom: 15px; color: #2c3e50; letter-spacing: 1px; }

        #lienzo-marco {
            background: white;
            border: 4px solid #3498db;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
        }

        canvas { display: block; border-radius: 26px; }

        #feedback {
            position: absolute; top: 20px; width: 100%;
            text-align: center; font-weight: 900; font-size: 1.2rem;
            color: #2ecc71; pointer-events: none;
        }

        .botones { margin-top: 30px; display: flex; gap: 20px; }

        button {
            padding: 15px 40px; border: none; border-radius: 50px;
            color: white; font-size: 1rem; font-weight: bold;
            cursor: pointer; transition: 0.2s;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .borrar { background-color: #ff5e57; }
        .siguiente { background-color: #0be881; }
        button:active { transform: scale(0.92); }
    </style>
</head>
<body>

    <div id="contenedor-principal">
        <h2>CLASE 6: GESTIÓN DE ESTADOS</h2>
        
        <div id="lienzo-marco">
            <div id="feedback">DIBUJA EL CÍRCULO</div>
            <canvas id="lienzo"></canvas>
        </div>

        <div class="botones">
            <button class="borrar" onclick="btnBorrar()">BORRAR</button>
            <button class="siguiente" onclick="btnSiguiente()">SIGUIENTE</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('lienzo');
        const ctx = canvas.getContext('2d');
        const feedback = document.getElementById('feedback');
        
        let dibujando = false;
        let indiceFigura = 0;

        const figuras = [
            { nombre: "CÍRCULO", radio: 85 },
            { nombre: "CUADRADO", radio: 95 },
            { nombre: "TRIÁNGULO", radio: 105 }
        ];

        function inicializar() {
            canvas.width = 320;
            canvas.height = 320;
            dibujarGuia();
        }

        function dibujarGuia() {
            // LIMPIEZA TOTAL DEL BÚFER
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Dibuja la referencia punteada
            ctx.beginPath();
            ctx.setLineDash([8, 8]);
            ctx.strokeStyle = "#dcdde1";
            ctx.lineWidth = 3;
            // Usamos un círculo como base de validación para todas las clases
            ctx.arc(canvas.width/2, canvas.height/2, figuras[indiceFigura].radio, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
            
            feedback.innerText = "DIBUJA EL " + figuras[indiceFigura].nombre;
            feedback.style.color = "#2ecc71";
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            // Ajuste crucial para compensar el zoom del 130% (1.3)
            return {
                x: (clientX - rect.left) / 1.3,
                y: (clientY - rect.top) / 1.3
            };
        }

        function iniciar(e) {
            e.preventDefault();
            dibujando = true;
            const p = getPos(e);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
        }

        function mover(e) {
            if (!dibujando) return;
            const p = getPos(e);
            
            // Lógica de validación
            const dx = p.x - canvas.width/2;
            const dy = p.y - canvas.height/2;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const ok = Math.abs(dist - figuras[indiceFigura].radio) < 20;

            ctx.lineTo(p.x, p.y);
            ctx.strokeStyle = ok ? "#2ecc71" : "#ff5e57";
            ctx.lineWidth = 12;
            ctx.lineCap = "round";
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);

            feedback.innerText = ok ? "¡EXCELENTE!" : "¡TE SALISTE!";
            feedback.style.color = ok ? "#2ecc71" : "#ff5e57";
        }

        // FUNCIONES DE CONTROL DE ESTADO (CLASE 6)
        function btnBorrar() {
            dibujarGuia();
        }

        function btnSiguiente() {
            indiceFigura = (indiceFigura + 1) % figuras.length;
            dibujarGuia();
        }

        canvas.addEventListener('touchstart', iniciar, {passive: false});
        canvas.addEventListener('touchmove', mover, {passive: false});
        window.addEventListener('touchend', () => dibujando = false);

        inicializar();
    </script>
</body>
</html>
