<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clase 1: Precisión Pura</title>
    <style>
        /* ESTILO BASE */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background-color: #f0f4f8;
            overflow: hidden; 
            touch-action: none; /* BLOQUEO DE SCROLL OBLIGATORIO */
        }

        h2 { font-family: sans-serif; color: #333; margin-bottom: 10px; }

        #lienzo {
            background-color: white;
            border: 3px solid #3498db;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            /* Zoom Nancy Elegante 130% */
            zoom: 130%; 
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <h2>CLASE 1: LIENZO PURO</h2>
    
    <canvas id="lienzo" width="300" height="300"></canvas>

    <script>
        const canvas = document.getElementById('lienzo');
        const ctx = canvas.getContext('2d');
        let dibujando = false;

        // Configuración estética del trazo
        ctx.strokeStyle = "#3498db";
        ctx.lineWidth = 8;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        /**
         * FUNCIÓN DE PRECISIÓN (El corazón de la clase)
         * Convierte la posición del dedo en coordenadas del canvas.
         */
        function obtenerPos(e) {
            const rect = canvas.getBoundingClientRect();
            // Detecta si es toque (touches) o mouse (cliente)
            const origen = e.touches ? e.touches[0] : e;
            
            return {
                // FÓRMULA: (Posición dedo - Margen lienzo) / Factor de Zoom
                x: (origen.clientX - rect.left) / 1.3,
                y: (origen.clientY - rect.top) / 1.3
            };
        }

        // EVENTOS DE COMUNICACIÓN (START, MOVE, END)
        
        // 1. Iniciar trazo
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            dibujando = true;
            const p = obtenerPos(e);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
        });

        // 2. Dibujar mientras se mueve
        canvas.addEventListener('touchmove', (e) => {
            if (!dibujando) return;
            e.preventDefault();
            const p = obtenerPos(e);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
        });

        // 3. Detener trazo
        canvas.addEventListener('touchend', () => {
            dibujando = false;
        });

        // Soporte para Mouse (para probar en tu PC)
        canvas.addEventListener('mousedown', (e) => {
            dibujando = true;
            const p = obtenerPos(e);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
        });
        canvas.addEventListener('mousemove', (e) => {
            if (!dibujando) return;
            const p = obtenerPos(e);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
        });
        window.addEventListener('mouseup', () => dibujando = false);
    </script>
</body>
</html>
