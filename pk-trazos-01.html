<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clase 6: Posicionamiento Dinámico</title>
    <style>
        /* ESTILO NANCY ELEGANTE 130% */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #2c3e50; touch-action: none; }
        canvas { display: block; background: #ecf0f1; zoom: 130%; } /* Zoom solicitado */
        #info { position: absolute; top: 10px; left: 10px; color: white; font-family: sans-serif; pointer-events: none; }
    </style>
</head>
<body>

    <div id="info">MUEVE EL DEDO PARA VALIDAR LAS COORDENADAS</div>
    <canvas id="lienzo"></canvas>

    <script>
        const canvas = document.getElementById('lienzo');
        const ctx = canvas.getContext('2d');

        // AJUSTE MANUAL: Cambie estos valores para mover el área de éxito
        const AREA = {
            ancho: 150,
            alto: 150,
            // Aquí se define la posición:
            x: 20,              // 20px desde la izquierda
            y: window.innerHeight / 1.3 - 170 // Cálculo para que quede abajo (ajustado por zoom)
        };

        function configurar() {
            canvas.width = window.innerWidth / 1.3; // Ajuste por el zoom 130%
            canvas.height = window.innerHeight / 1.3;
            dibujarAreaDestino();
        }

        function dibujarAreaDestino() {
            ctx.strokeStyle = "#3498db";
            ctx.setLineDash([5, 5]);
            ctx.strokeRect(AREA.x, AREA.y, AREA.ancho, AREA.alto);
            ctx.setLineDash([]);
        }

        function validarYDibujar(e) {
            e.preventDefault();
            // Detectar si es Touch o Mouse de forma automática
            const touch = e.touches ? e.touches[0] : e;
            const rect = canvas.getBoundingClientRect();
            
            // EL SECRETO: Coordenadas relativas al lienzo
            const posX = (touch.clientX - rect.left) / 1.3;
            const posY = (touch.clientY - rect.top) / 1.3;

            // VALIDACIÓN MATEMÁTICA: ¿Está dentro del cuadrado?
            const estaDentro = (posX >= AREA.x && posX <= AREA.x + AREA.ancho &&
                               posY >= AREA.y && posY <= AREA.y + AREA.alto);

            // Dibujo técnico
            ctx.fillStyle = estaDentro ? "#2ecc71" : "#e74c3c";
            ctx.fillRect(posX, posY, 10, 10);
        }

        // EVENTOS UNIFICADOS (PC y Celular)
        canvas.addEventListener('touchstart', validarYDibujar);
        canvas.addEventListener('touchmove', validarYDibujar);
        canvas.addEventListener('mousedown', () => canvas.onmousemove = validarYDibujar);
        window.addEventListener('mouseup', () => canvas.onmousemove = null);

        window.onresize = configurar;
        configurar();
    </script>
</body>
</html>
