<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clase 6: Control de Memoria y Estados</title>
    <style>
        /* ESTILO NANCY ELEGANTE - PROYECTO PREKINDER 2026 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; height: 100%; 
            overflow: hidden; 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background-color: #f0f4f8; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* BLOQUEO DE SCROLL OBLIGATORIO */
        }

        h2 { margin-bottom: 10px; color: #333; text-transform: uppercase; letter-spacing: 2px; }

        #contenedor-lienzo {
            background-color: white;
            border: 3px solid #3498db;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            zoom: 130%; /* Zoom Nancy Elegante */
            position: relative;
            overflow: hidden;
        }

        canvas { display: block; cursor: crosshair; }

        .controles {
            margin-top: 25px;
            display: flex;
            gap: 20px;
        }

        button {
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-borrar { background-color: #ff5e57; }
        .btn-borrar:active { background-color: #e24e48; transform: scale(0.95); }

        .btn-siguiente { background-color: #0be881; }
        .btn-siguiente:active { background-color: #09cc72; transform: scale(0.95); }

        #monitor {
            position: absolute;
            top: 15px;
            width: 100%;
            text-align: center;
            font-weight: 900;
            pointer-events: none;
            color: #2ecc71;
        }
    </style>
</head>
<body>

    <h2>Clase 6: Gestión de Estados</h2>
    
    <div id="contenedor-lienzo">
        <div id="monitor">TRAZA EL CÍRCULO</div>
        <canvas id="lienzo"></canvas>
    </div>

    <div class="controles">
        <button class="btn-borrar" onclick="borrarTodo()">BORRAR</button>
        <button class="btn-siguiente" onclick="siguienteFigura()">SIGUIENTE</button>
    </div>

    <script>
        const canvas = document.getElementById('lienzo');
        const ctx = canvas.getContext('2d');
        const monitor = document.getElementById('monitor');
        
        let dibujando = false;
        let figuraActual = 0; // Estado del sistema

        // Configuración de coordenadas de validación
        const figuras = [
            { nombre: "CÍRCULO", r: 80 },
            { nombre: "TRIÁNGULO", r: 100 },
            { nombre: "CUADRADO", r: 90 }
        ];

        function ajustarLienzo() {
            canvas.width = 300;
            canvas.height = 300;
            dibujarReferencia();
        }

        function dibujarReferencia() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, figuras[figuraActual].r, 0, Math.PI * 2);
            ctx.strokeStyle = "#dfe6e9";
            ctx.lineWidth = 4;
            ctx.setLineDash([10, 10]);
            ctx.stroke();
            ctx.setLineDash([]); // Reset
            monitor.innerText = "DIBUJA EL " + figuras[figuraActual].nombre;
        }

        // LÓGICA DE VALIDACIÓN (INGENIERÍA)
        function estaEnRango(x, y) {
            const dx = x - (canvas.width / 2);
            const dy = y - (canvas.height / 2);
            const distancia = Math.sqrt(dx*dx + dy*dy);
            return distancia <= figuras[figuraActual].r;
        }

        function obtenerPosicion(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            // Ajuste por el zoom del 130%
            return {
                x: (clientX - rect.left) / 1.3,
                y: (clientY - rect.top) / 1.3
            };
        }

        function iniciar(e) {
            e.preventDefault();
            dibujando = true;
            const pos = obtenerPosicion(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function mover(e) {
            if (!dibujando) return;
            const pos = obtenerPosicion(e);
            const correcto = estaEnRango(pos.x, pos.y);

            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = correcto ? "#2ecc71" : "#e74c3c";
            ctx.lineWidth = 10;
            ctx.lineCap = "round";
            ctx.stroke();

            // Reiniciamos camino para permitir cambio de color fluido
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);

            monitor.innerText = correcto ? "¡VAS BIEN!" : "¡TE SALISTE!";
            monitor.style.color = correcto ? "#2ecc71" : "#e74c3c";
        }

        // COMANDOS DE CONTROL (CLASE 6)
        function borrarTodo() {
            dibujarReferencia();
            monitor.style.color = "#2ecc71";
        }

        function siguienteFigura() {
            figuraActual = (figuraActual + 1) % figuras.length;
            borrarTodo();
        }

        // LISTENERS
        canvas.addEventListener('touchstart', iniciar, {passive: false});
        canvas.addEventListener('touchmove', mover, {passive: false});
        window.addEventListener('touchend', () => dibujando = false);

        ajustarLienzo();
    </script>
</body>
</html>
