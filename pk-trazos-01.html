<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prekinder - Trazos Exactos</title>
    <style>
        /* BASE NANCY ELEGANTE */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start;
            overflow: hidden;
            touch-action: none; /* Evita que la pantalla se mueva al dibujar */
        }

        h1 { font-size: 2.2rem; color: #1a1a1a; margin: 20px 0 5px 0; font-weight: 900; }
        .sub-t { font-size: 1rem; color: #555; margin-bottom: 15px; letter-spacing: 2px; }

        #contenedor-canvas {
            position: relative;
            width: 320px; /* Tamaño fijo para evitar errores de cálculo */
            height: 320px;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 2px solid #eee;
            zoom: 130%; /* Tu estilo Nancy Elegante */
        }

        #lienzoTrazos {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            z-index: 10;
            touch-action: none;
        }

        .guia-figura {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border: 10px dashed #ccc;
            z-index: 5;
            pointer-events: none;
        }

        .circulo { width: 220px; height: 220px; border-radius: 50%; }
        .cuadrado { width: 200px; height: 200px; }
        .triangulo { 
            width: 0; height: 0; 
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-bottom: 180px dashed #ccc;
        }

        .controles { display: flex; gap: 15px; margin-top: 80px; } /* Ajustado por el zoom */
        .btn {
            padding: 15px 30px; border: none; border-radius: 50px;
            font-weight: 900; cursor: pointer; color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .btn-borrar { background: #ff4d4d; }
        .btn-sig { background: #2ecc71; }
    </style>
</head>
<body>

    <h1>PREKINDER 2026</h1>
    <p class="sub-t">TRAZA LA FIGURA</p>

    <div id="contenedor-canvas">
        <div id="figura-guia" class="guia-figura circulo"></div>
        <canvas id="lienzoTrazos"></canvas>
    </div>

    <div class="controles">
        <button class="btn btn-borrar" onclick="limpiar()">BORRAR</button>
        <button class="btn btn-sig" onclick="cambiar()">SIGUIENTE</button>
    </div>

    <script>
        const canvas = document.getElementById('lienzoTrazos');
        const ctx = canvas.getContext('2d');
        let dibujando = false;
        const escalaZoom = 1.3; // Representa el 130% de tu estilo

        function ajustar() {
            // Ajustamos el canvas a su tamaño real de visualización
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.strokeStyle = '#3498db';
            ctx.lineWidth = 10;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        window.onload = ajustar;

        // LA CORRECCIÓN MAESTRA:
        function pos(e) {
            const r = canvas.getBoundingClientRect();
            const t = e.touches ? e.touches[0] : e;
            
            // Dividimos entre escalaZoom para compensar el zoom: 130%
            return { 
                x: (t.clientX - r.left) / escalaZoom, 
                y: (t.clientY - r.top) / escalaZoom 
            };
        }

        function inicio(e) { 
            e.preventDefault(); 
            dibujando = true; 
            const p = pos(e);
            ctx.beginPath(); 
            ctx.moveTo(p.x, p.y); 
        }

        function mover(e) { 
            if(!dibujando) return; 
            e.preventDefault();
            const p = pos(e); 
            ctx.lineTo(p.x, p.y); 
            ctx.stroke(); 
        }

        function fin() { dibujando = false; }

        canvas.addEventListener('touchstart', inicio);
        canvas.addEventListener('touchmove', mover);
        canvas.addEventListener('touchend', fin);
        canvas.addEventListener('mousedown', inicio);
        canvas.addEventListener('mousemove', mover);
        canvas.addEventListener('mouseup', fin);

        const figuras = ['circulo', 'cuadrado', 'triangulo'];
        let idx = 0;
        function limpiar() { ctx.clearRect(0,0,canvas.width, canvas.height); }
        function cambiar() {
            limpiar();
            idx = (idx + 1) % figuras.length;
            document.getElementById('figura-guia').className = 'guia-figura ' + figuras[idx];
        }
    </script>
</body>
</html>
