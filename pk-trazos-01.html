<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clase 3: Trazo Dinámico por Zonas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100vw; height: 100vh;
            overflow: hidden; touch-action: none; /* BLOQUEO CLASE 1 */
            background-color: #f0f4f8;
            font-family: sans-serif;
        }

        canvas {
            display: block;
            background-color: white;
        }

        #ui-guia {
            position: absolute;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            border-radius: 50px;
            pointer-events: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui-guia">CLASE 3: DIBUJO POR CUADRANTES</div>
    <canvas id="lienzo"></canvas>

    <script>
        const canvas = document.getElementById('lienzo');
        const ctx = canvas.getContext('2d');
        const guia = document.getElementById('ui-guia');
        
        let dibujando = false;

        // Ajuste de pantalla completa
        function ajustarPantalla() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = ajustarPantalla;
        ajustarPantalla();

        // LÓGICA DE COLOR POR CUADRANTE (CLASE 2)
        function obtenerColorZona(x, y) {
            const w = canvas.width;
            const h = canvas.height;
            
            if (x < w/3) return "#e74c3c";      // Izquierda: Rojo
            if (x > (w*2)/3) return "#2ecc71";  // Derecha: Verde
            return "#3498db";                   // Centro: Azul
        }

        function iniciarDibujo(e) {
            e.preventDefault();
            dibujando = true;
            
            const t = e.touches ? e.touches[0] : e;
            const x = t.clientX;
            const y = t.clientY;

            // Configuramos el pincel según la zona de inicio
            ctx.strokeStyle = obtenerColorZona(x, y);
            ctx.lineWidth = 15;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";

            ctx.beginPath();
            ctx.moveTo(x, y);
            guia.innerText = "Dibujando en zona detectada";
        }

        function trazar(e) {
            if (!dibujando) return;
            e.preventDefault();
            
            const t = e.touches ? e.touches[0] : e;
            ctx.lineTo(t.clientX, t.clientY);
            ctx.stroke();
        }

        function detenerDibujo() {
            dibujando = false;
            guia.innerText = "¡Sigue trazando!";
        }

        // EVENTOS MAESTROS
        canvas.addEventListener('touchstart', iniciarDibujo, {passive: false});
        canvas.addEventListener('touchmove', trazar, {passive: false});
        canvas.addEventListener('touchend', detenerDibujo);

        // Soporte Mouse para PC
        canvas.addEventListener('mousedown', iniciarDibujo);
        canvas.addEventListener('mousemove', trazar);
        window.addEventListener('mouseup', detenerDibujo);
    </script>
</body>
</html>
