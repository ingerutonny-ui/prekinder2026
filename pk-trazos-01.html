<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clase 1: El Toque Básico</title>
    <style>
        /* ESTILO NANCY ELEGANTE BASE */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: #f0f4f8;
            overflow: hidden; 
            touch-action: none; /* EVITA QUE LA PANTALLA SE MUEVA AL DIBUJAR */
        }

        #lienzo {
            background-color: white;
            border: 2px solid #ccc;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            zoom: 130%; /* TU ESCALADO PERSONALIZADO */
        }
    </style>
</head>
<body>

    <canvas id="lienzo" width="300" height="300"></canvas>

    <script>
        const canvas = document.getElementById('lienzo');
        const ctx = canvas.getContext('2d');
        let dibujando = false;

        // CONFIGURACIÓN DEL PINCEL
        ctx.strokeStyle = "#3498db"; // Azul
        ctx.lineWidth = 10;          // Grueso para niños
        ctx.lineCap = "round";       // Punta redondeada

        // LA FUNCIÓN MÁS IMPORTANTE: ¿DÓNDE ESTÁ EL DEDO?
        function obtenerCoordenadas(e) {
            const rect = canvas.getBoundingClientRect(); // Localiza el canvas en la pantalla
            const toque = e.touches ? e.touches[0] : e;  // Detecta si es dedo o mouse
            
            return {
                // EXPLICACIÓN: Restamos el margen y dividimos por 1.3 (tu zoom)
                x: (toque.clientX - rect.left) / 1.3,
                y: (toque.clientY - rect.top) / 1.3
            };
        }

        // 1. INICIO: Cuando el dedo toca la pantalla (START)
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Evita scroll
            dibujando = true;
            const p = obtenerCoordenadas(e);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
        });

        // 2. MOVIMIENTO: Cuando el dedo se desliza (MOVE)
        canvas.addEventListener('touchmove', (e) => {
            if (!dibujando) return;
            e.preventDefault();
            const p = obtenerCoordenadas(e);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
        });

        // 3. FIN: Cuando el dedo se levanta (END)
        canvas.addEventListener('touchend', () => {
            dibujando = false;
        });
    </script>
</body>
</html>
