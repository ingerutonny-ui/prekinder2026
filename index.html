<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Kinder 2026 - Inicio</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* Aplicamos tu nueva imagen de fondo */
            background: url('fondo_trazos.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Arial', sans-serif;
            text-align: center;
        }

        /* Capa opcional para mejorar la lectura sobre el fondo */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 235, 59, 0.4); /* Amarillo semi-transparente */
            z-index: -1;
        }

        h1 {
            color: #E91E63;
            font-size: 2.2rem;
            margin-top: 20px;
            margin-bottom: 30px;
            text-shadow: 2px 2px white;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px 20px;
            border-radius: 50px;
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            width: 85%;
            max-width: 550px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            text-decoration: none;
            color: #333;
            transition: transform 0.3s;
            border: 4px solid #4CAF50;
        }

        .card:active {
            transform: scale(0.9);
        }

        .card h2 {
            margin: 10px 0;
            font-size: 1.1rem;
        }

        .icon {
            font-size: 3rem;
        }

        /* Estilo para la Profe Maxi */
        .profe-container {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .img-profe {
            width: 400px; /* Ajusta según el tamaño de tu imagen */
            height: auto;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .firma {
            margin-top: 10px;
            font-size: 1.4rem;
            color: #3F51B5;
            font-weight: bold;
            font-style: italic;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 15px;
            border-radius: 20px;
        }

        /* Estilo específico para tarjetas deshabilitadas o pendientes */
        .card.disabled {
            opacity: 0.7;
            border-color: #9E9E9E;
            cursor: not-allowed;
        }
        .card.disabled h2 span {
            display: block;
            font-size: 0.85rem;
            color: #757575;
            font-weight: normal;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <h1>🖍️ Mi Jardín Digital 2026</h1>

    <div class="menu-container">
        <a href="pk-trazos-01.html" class="card">
            <div class="icon">✍️</div>
            <h2>Practicar Trazos 01</h2>
        </a>

        <a href="vocal_a.html" class="card">
            <div class="icon">🅰️</div>
            <h2>Vocal A</h2>
        </a>

        <a href="#" class="card disabled" onclick="return false;">
            <div class="icon">🇪</div>
            <h2>Vocal E <span>Próximamente</span></h2>
        </a>
    </div>

    <div class="profe-container">
        <img src="profe_maxi.png" alt="Profe Maxi" class="img-profe">
        <div class="firma">.....Pre-Kinder "D".....</div>
    </div>

</body>
</html>
