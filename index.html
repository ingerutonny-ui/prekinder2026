<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Kinder 2026 - Inicio</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffeb3b; /* Amarillo divertido */
            font-family: 'Arial', sans-serif;
            text-align: center;
        }

        h1 {
            color: #e91e63;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px white;
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 80%;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            text-decoration: none;
            color: #333;
            transition: transform 0.3s;
            border: 4px solid #4caf50;
        }

        .card:active {
            transform: scale(0.9);
        }

        .card h2 {
            margin: 10px 0;
            font-size: 1.2rem;
        }

        .icon {
            font-size: 3rem;
        }
    </style>
</head>
<body>

    <h1>🖍️ Mi Jardín Digital 2026</h1>

    <div class="menu-container">
        <a href="pk-trazos-01.html" class="card">
            <div class="icon">✍️</div>
            <h2>Practicar Trazos 01</h2>
        </a>

        <div class="card" style="opacity: 0.5; border-color: #ccc;">
            <div class="icon">🎨</div>
            <h2>Colores (Próximamente)</h2>
        </div>
    </div>

    <div class="firma">
        .....La Profe. Maxi.....
    </div>

    
</body>
</html>
