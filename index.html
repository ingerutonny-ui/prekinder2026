<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Kinder 2026 - Inicio</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: url('fondo_trazos.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Arial', sans-serif;
            text-align: center;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 235, 59, 0.4);
            z-index: -1;
        }

        h1 {
            color: #E91E63;
            font-size: 2.2rem;
            margin-top: 20px;
            margin-bottom: 30px;
            text-shadow: 2px 2px white;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px 20px;
            border-radius: 50px;
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 25px;
            width: 85%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            text-decoration: none;
            color: #333;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 4px solid #4CAF50;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.4);
        }

        .card img {
            width: 80px;
            height: auto;
            margin-bottom: 10px;
        }

        .card h2 {
            margin: 0;
            font-size: 1rem;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .profe-container {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .img-profe {
            width: 400px;
            height: auto;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .firma {
            margin-top: 10px;
            font-size: 1.4rem;
            color: #3F51B5;
            font-weight: bold;
            font-style: italic;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 15px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <h1>🖍️ Mi Jardín Digital 2026</h1>

    <div class="menu-container">
        <a href="pk-trazos-01.html" class="card">
            <div class="icon">✍️</div>
            <h2>Practicar Trazos 01</h2>
        </a>

        <a href="vocal_a.html" class="card">
            <img src="a.png" alt="Vocal A">
            <h2>Vocal A</h2>
        </a>

        <a href="vocal_e.html" class="card">
            <img src="e.png" alt="Vocal E">
            <h2>Vocal E</h2>
        </a>

        <a href="numero_6.html" class="card">
            <img src="6.png" alt="Número 6">
            <h2>Número 6</h2>
        </a>

        <a href="vocal_i.html" class="card">
            <img src="i.png" alt="Vocal I">
            <h2>Vocal I</h2>
        </a>

        <a href="vocal_o.html" class="card">
            <img src="o.png" alt="Vocal O">
            <h2>Vocal O</h2>
        </a>

        <a href="vocal_u.html" class="card">
            <img src="u.png" alt="Vocal U">
            <h2>Vocal U</h2>
        </a>
    </div>

    <div class="profe-container">
        <img src="profe_maxi.png" alt="Profe Maxi" class="img-profe">
        <div class="firma">.....Pre-Kinder "D".....</div>
    </div>

</body>
</html>
