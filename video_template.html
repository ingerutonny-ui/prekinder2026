<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Kinder 2026 - Video</title>
    <style>
        body {
            margin: 0; min-height: 100vh;
            background: url('fondo_trazos.jpg') no-repeat center center fixed;
            background-size: cover; font-family: 'Arial', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255, 235, 59, 0.4); z-index: -1; }
        
        h1 { color: #E91E63; font-size: 2rem; margin-bottom: 20px; text-shadow: 2px 2px white; background: rgba(255, 255, 255, 0.8); padding: 10px 25px; border-radius: 50px; border: 3px solid #FF9800; }

        /* Contenedor del video */
        .video-wrapper {
            background: white; padding: 15px; border-radius: 25px;
            border: 6px solid #4CAF50; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 90%; max-width: 700px; text-align: center;
        }
        
        /* Ajuste para el iframe de YouTube */
        iframe { width: 100%; height: 400px; border-radius: 15px; }

        /* Botón de retorno */
        .btn-back {
            margin-top: 25px; padding: 15px 30px; font-size: 1.2rem;
            background-color: #2196F3; color: white; border: none;
            border-radius: 50px; text-decoration: none; font-weight: bold;
            box-shadow: 0 5px 0 #1565C0; transition: 0.2s;
        }
        .btn-back:active { transform: translateY(5px); box-shadow: none; }

        .mini-profe { position: absolute; bottom: 20px; right: 20px; width: 120px; }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <h1>🎬 ¡Aprendamos juntos!</h1>

    <div class="video-wrapper">
        <iframe 
            src="https://www.youtube.com/embed/EYOsAbazkSI" 
            title="YouTube video player" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>

    <a href="index.html" class="btn-back">⬅ Volver al Menú</a>

    <img src="profe_maxi.png" class="mini-profe" alt="Profe Maxi">

</body>
</html>
